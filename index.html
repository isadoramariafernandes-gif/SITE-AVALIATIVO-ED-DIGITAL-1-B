<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioViagens | Explore o Mundo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Navegação Principal">
            <div class="logo">BioViagens</div>
            <div class="controls">
                <button onclick="adjustFont('increase')" aria-label="Aumentar fonte">A+</button>
                <button onclick="adjustFont('decrease')" aria-label="Diminuir fonte">A-</button>
                <button onclick="toggleContrast()" id="contrast-toggle" aria-label="Alternar alto contraste">🌓</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero reveal" aria-labelledby="hero-title">
            <h1 id="hero-title">Destinos que inspiram sua alma</h1>
            <p>Viagens sustentáveis e roteiros exclusivos pelo mundo.</p>
        </section>

        <section id="destinos" class="reveal" aria-labelledby="destinos-title">
            <h2 id="destinos-title">Nossas Curadorias</h2>
            <div id="grid-destinos" class="container-grid">
                </div>
        </section>

        <section id="faq" class="reveal" aria-labelledby="faq-title">
            <h2 id="faq-title">Dúvidas Frequentes</h2>
            <div id="faq-container">
                </div>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2026 BioViagens - Acessibilidade em primeiro lugar.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
