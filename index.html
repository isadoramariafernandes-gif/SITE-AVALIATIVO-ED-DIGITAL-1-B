 
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Esporte Total</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Menu Principal">
            <div class="logo">EsporteTotal</div>
            <div class="controls">
                <button id="btn-contrast" aria-label="Alternar alto contraste">🌓 Contraste</button>
                <button id="btn-font-up" aria-label="Aumentar fonte">A+</button>
                <button id="btn-font-down" aria-label="Diminuir fonte">A-</button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h1>O Mundo dos Esportes</h1>
            <p>Performance, saúde e paixão em um só lugar.</p>
        </section>

        <section id="modalidades">
            <h2>Modalidades em Destaque</h2>
            <div id="grid-esportes" class="grid-container">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
