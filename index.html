
       <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maré Alta | Viagens Inesquecíveis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar" aria-label="Navegação Superior">
            <div class="logo">Maré<span>Alta</span></div>
            <div class="accessibility-bar">
                <button onclick="changeFontSize('inc')" aria-label="Aumentar texto">A+</button>
                <button onclick="changeFontSize('dec')" aria-label="Diminuir texto">A-</button>
                <button onclick="toggleContrast()" id="btn-contrast" aria-label="Modo Noturno/Contraste">🌓</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero reveal">
            <div class="hero-content">
                <h1>Onde as ondas encontram a alma.</h1>
                <p>Destinos paradisíacos selecionados por especialistas em oceano.</p>
                <a href="#destinos" class="btn-main">Explorar Destinos</a>
            </div>
        </section>

        <section id="destinos" class="reveal" aria-labelledby="title-destinos">
            <h2 id="title-destinos" class="section-title">Destinos de Tirar o Fôlego</h2>
            <div id="gallery-container" class="grid-layout">
                </div>
        </section>

        <section class="faq reveal">
            <h2 class="section-title">Prepare sua Mala</h2>
            <div id="faq-list">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Maré Alta Viagens. Práticas de UX e Acessibilidade.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
