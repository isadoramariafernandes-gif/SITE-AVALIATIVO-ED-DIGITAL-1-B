<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExploraMundo - Sua próxima aventura começa aqui</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Menu Principal">
            <div class="logo">ExploraMundo</div>
            <div class="accessibility-controls">
                <button onclick="changeFontSize('increase')" aria-label="Aumentar fonte">A+</button>
                <button onclick="changeFontSize('decrease')" aria-label="Diminuir fonte">A-</button>
                <button onclick="toggleContrast()" aria-label="Alternar Alto Contraste">🌓</button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero" class="reveal">
            <h1>Descubra destinos inacreditáveis</h1>
            <p>Experiências personalizadas para viajantes autênticos.</p>
        </section>

        <section id="destinos" aria-labelledby="titulo-destinos" class="reveal">
            <h2 id="titulo-destinos">Destinos em Destaque</h2>
            <div id="destinos-grid" class="grid-container">
                </div>
        </section>

        <section id="faq" class="reveal">
            <h2>Dúvidas Frequentes</h2>
            <div id="faq-container">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 ExploraMundo. Focado em acessibilidade.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
